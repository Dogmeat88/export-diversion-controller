substitutions:
  hostname: 'export-diversion'
  devicename: Export Diversion Controller
web_server:
  port: 80
esphome:
  name: $hostname
  platform: ESP32
  board: nodemcu-32s
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: True
api:
  reboot_timeout: 0s
ota:
logger:

i2c:
  scl: GPIO13
  sda: GPIO14
  scan: true

output:
  - platform: mcp4725
    id: dac_output

fan:
  - platform: speed
    output: dac_output
    name: "HWC Controller"
    id: fan1

switch:
  - platform: gpio
    pin: GPIO27
    id: diversion_relay
    name: "Diversion Relay"

dallas:
  - pin: GPIO25

sensor:
  - platform: dallas
    address: 0xfa77b3d443f55c28
    name: "HWC Temperature"
    id: hwc_temp