substitutions:
  hostname: 'diversion'
  devicename: Export Diversion Controller
web_server:
  port: 80
esphome:
  name: $hostname
  platform: ESP32
  board: esp-wrover-kit
  arduino_version: recommended
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: True
api:
  reboot_timeout: 0s
ota:
logger:
  baud_rate: 0

output:
  - platform: ac_dimmer
    id: hrv_motor
    gate_pin: GPIO18
    zero_cross_pin:
      number: GPIO19
      mode: INPUT
      inverted: yes

fan:
  - platform: speed
    output: hrv_motor
    name: "HRV Attic Fan"
    id: hrv_fan

