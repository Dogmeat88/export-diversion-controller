substitutions:
  hostname: 'diversion'
  devicename: Export Diversion Controller
web_server:
  port: 80
esphome:
  name: $hostname
esp32:
  variant: esp32c3
  board: esp32-c3-devkitm-1
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: True
api:
  reboot_timeout: 0s
ota:
logger:
  baud_rate: 0

i2c:
  scl: GPIO00
  sda: GPIO01
  scan: true

output:
  - platform: mcp4725
    id: dac_output

fan:
  - platform: speed
    output: dac_output
    name: "HWC Controller"
    id: fan1

switch:
  - platform: gpio
    pin: GPIO02
    id: diversion_relay
    name: "Diversion Relay"